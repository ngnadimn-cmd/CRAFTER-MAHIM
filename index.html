<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    overflow:hidden;
}


/* Hacker Matrix Background */

body::before{
    content:"010101  HACKER  CRAFTER MAHIM  101010";
    position:absolute;
    width:100%;
    height:100%;
    color:#00ff99;
    opacity:0.15;
    font-size:35px;
    animation:matrix 8s linear infinite;
}


@keyframes matrix{
    from{
        transform:translateY(-100%);
    }
    to{
        transform:translateY(100%);
    }
}


body::after{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle,#00ffee33,transparent 40%),
    radial-gradient(circle,#00ff0033,transparent 40%);
    animation:rotate 15s linear infinite;
}


@keyframes rotate{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}


.container{

    position:relative;
    width:90%;
    max-width:500px;

    text-align:center;

    padding:30px;

    border:2px solid #00ffee;

    border-radius:25px;

    background:rgba(0,0,0,0.85);

    box-shadow:
    0 0 20px #00ffee,
    0 0 50px #00ffee;

    z-index:2;
}


/* Your Image */

.logo{

    width:240px;

    max-width:100%;

    border-radius:20px;

    margin-bottom:15px;

    border:3px solid #00ffee;

    box-shadow:
    0 0 20px #00ffee,
    0 0 40px #00ff99;

}


/* Title */

h1{

    color:#00ffee;

    font-size:35px;

    margin-bottom:25px;

    text-shadow:
    0 0 10px #00ffee,
    0 0 30px #00ffee;

}



/* Buttons */

.btn{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:12px;

    width:100%;

    padding:18px;

    margin:12px 0;

    border-radius:15px;

    text-decoration:none;

    color:white;

    font-size:20px;

    font-weight:bold;

    transition:.3s;

    box-shadow:0 0 15px #00ffee;

}


.btn:hover{

    transform:scale(1.08);

    box-shadow:
    0 0 30px #00ffee,
    0 0 60px #00ffee;

}



/* Button Colors */

.youtube{
    background:red;
}

.telegram{
    background:#0088cc;
}

.tiktok{
    background:#111;
}

.freefire{

    background:linear-gradient(45deg,#ff8800,#ffff00);

    color:black;

}



/* Footer */

.footer{

    margin-top:20px;

    color:#00ffee;

    font-size:14px;

    text-shadow:0 0 15px #00ffee;

}

</style>

</head>


<body>


<div class="container">
